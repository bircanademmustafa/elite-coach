<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;height:-webkit-fill-available;overflow:hidden;font-family:'Inter',sans-serif}
body{background:#080A12}
input,button,textarea,select{-webkit-appearance:none;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:0;height:0}
textarea{resize:none;color:inherit}
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;background:rgba(255,255,255,0.08)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#00ff88,#00cfff);cursor:pointer;box-shadow:0 2px 12px rgba(0,255,136,0.5)}

/* Premium background mesh */
.app-bg{
  background:#080A12;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%,rgba(0,255,136,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(196,77,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(0,207,255,0.03) 0%,transparent 70%);
}

/* Glass cards */
.glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08)}
.glass-light{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12)}

/* Premium shadows */
.shadow-sm{box-shadow:0 4px 16px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.04) inset}
.shadow-md{box-shadow:0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.05) inset}
.shadow-lg{box-shadow:0 20px 60px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.06) inset}
.shadow-glow-green{box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 40px rgba(0,255,136,0.15),0 1px 0 rgba(255,255,255,0.05) inset}

/* Gradient text */
.grad-text{background:linear-gradient(135deg,#00ff88,#00cfff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-text-warm{background:linear-gradient(135deg,#ffe040,#ff7722);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes countUp{from{opacity:0;transform:translateY(8px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes ringFill{from{stroke-dashoffset:201}to{stroke-dashoffset:var(--d)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes heroSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tapFeedback{0%{transform:scale(1)}50%{transform:scale(0.97)}100%{transform:scale(1)}}
@keyframes navPill{all 0.3s cubic-bezier(0.4,0,0.2,1)}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,255,136,0.2)}50%{box-shadow:0 0 40px rgba(0,255,136,0.5)}}
</style>

function epley(w,r){return(w>0&&r>0)?Math.round(w*(1+r/30)):0}
function lkey(w,d){return"W"+w+"D"+d}
function todayKey(){var n=new Date();return n.getFullYear()+"-"+(n.getMonth()+1)+"-"+n.getDate()}
function fmtDate(ts){return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"})}

function sColor(v){return v>=7?T.green:v>=4?T.orange:T.red}
function soColor(v){return v<=3?T.green:v<=6?T.orange:T.red}
function avg(arr,k){if(!arr.length)return null;return+(arr.reduce((s,c)=>s+(c[k]||0),0)/arr.length).toFixed(1)}
function blankSets(ex,wk){var n=SCHEME[phaseOf(wk)].sets,arr=[];for(var i=0;i<n;i++)arr.push({set:i+1,weight:ex.unit==="lbs"?String(ex.start):"",reps:"",done:false});return arr}
function buildEntry(sets,wk,ts){var done=sets.filter(s=>s.done&&parseFloat(s.weight)>0&&parseInt(s.reps)>0);if(!done.length)return null;var best={estOneRM:0,maxWeight:0,maxReps:0};done.forEach(s=>{var orm=epley(parseFloat(s.weight),parseInt(s.reps));if(orm>best.estOneRM){best.estOneRM=orm;best.maxWeight=parseFloat(s.weight);best.maxReps=parseInt(s.reps)}});return{skey:"W"+wk,ts,date:fmtDate(ts),label:fmtDate(ts),...best}}
function mergeHistory(hist,exId,entry){if(!entry)return hist;var arr=(hist[exId]||[]).slice();var idx=arr.findIndex(e=>e.skey===entry.skey);if(idx>=0)arr[idx]=entry;else arr.push(entry);arr.sort((a,b)=>a.ts-b.ts);return{...hist,[exId]:arr}}
function getPrevSets(log,exId,wk,dy){var cur=(wk-1)*3+(dy-1),best={idx:-1,sets:null},keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var m=keys[i].match(/^W(\d+)D(\d+)$/);if(!m)continue;var idx=(parseInt(m[1])-1)*3+(parseInt(m[2])-1);if(idx>=cur)continue;var sets=(log[keys[i]]||{})[exId];if(!sets||!sets.some(s=>s.done))continue;if(idx>best.idx){best.idx=idx;best.sets=sets}}return best.sets}
function calcVol(log){var v=0,keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var sess=log[keys[i]]||{},exIds=Object.keys(sess);for(var j=0;j<exIds.length;j++){var sets=sess[exIds[j]]||[];for(var k=0;k<sets.length;k++){var s=sets[k];if(s.done&&parseFloat(s.weight)>0&&parseInt(s.reps)>0)v+=parseFloat(s.weight)*parseInt(s.reps)}}}return Math.round(v)}
function calcSessVol(sess){var v=0,exIds=Object.keys(sess||{});for(var j=0;j<exIds.length;j++){var sets=sess[exIds[j]]||[];for(var k=0;k<sets.length;k++){var s=sets[k];if(s.done&&parseFloat(s.weight)>0&&parseInt(s.reps)>0)v+=parseFloat(s.weight)*parseInt(s.reps)}}return Math.round(v)}
function calcSessions(log){var c=0,keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var sess=log[keys[i]]||{};var has=Object.keys(sess).some(exId=>(sess[exId]||[]).some(s=>s.done));if(has)c++}return c}
function getMuscles(log){var map={},keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var sess=log[keys[i]]||{},exIds=Object.keys(sess);for(var j=0;j<exIds.length;j++){var sets=sess[exIds[j]]||[];if(sets.some(s=>s.done)){var ms=EX_MUSCLES[exIds[j]]||[];ms.forEach(m=>map[m]=true)}}}return Object.keys(map)}
function dcol(id){return PROG[1].exercises.find(e=>e.id===id)?PROG[1].color:PROG[2].exercises.find(e=>e.id===id)?PROG[2].color:PROG[3].color}
function dgrad(id){return PROG[1].exercises.find(e=>e.id===id)?PROG[1].grad:PROG[2].exercises.find(e=>e.id===id)?PROG[2].grad:PROG[3].grad}
function calcStrengthScore(pbs,bw){var b=bw||130,stds={d1e1:[0.5,1.0,1.5,2.0],d1e2:[0.45,0.75,1.0,1.4],d2e1:[0.7,1.0,1.4,1.9],d2e2:[0,0.1,0.3,0.5],d2e3:[0.35,0.55,0.75,1.0],d3e1:[0.9,1.4,1.9,2.5],d3e4:[0.35,0.55,0.75,1.0]},wts={d1e1:0.22,d1e2:0.18,d2e1:0.15,d2e2:0.1,d2e3:0.12,d3e1:0.28,d3e4:0.1},total=0,tw=0;Object.keys(stds).forEach(id=>{var pb=pbs[id];if(!pb)return;var ratio=pb.oneRM/b,lvls=stds[id],score=0;if(ratio>=lvls[3])score=100;else if(ratio>=lvls[2])score=75+(ratio-lvls[2])/(lvls[3]-lvls[2])*25;else if(ratio>=lvls[1])score=50+(ratio-lvls[1])/(lvls[2]-lvls[1])*25;else if(ratio>=lvls[0])score=25+(ratio-lvls[0])/(lvls[1]-lvls[0])*25;else score=(ratio/lvls[0])*25;var w=wts[id]||0.05;total+=score*w;tw+=w});return tw>0?Math.round(total/tw):0}
function getLevel(app){var achieved=ACHIEVEMENTS.filter(a=>{try{return a.check(app)}catch(e){return false}}).length,workouts=calcSessions(app.log),pbs=Object.keys(app.pbs||{}).length,score=achieved*3+Math.floor(workouts/2)+Math.floor(pbs/3);if(score>=20)return{name:"Legend",icon:"👑",color:T.yellow,score,next:null};if(score>=14)return{name:"Elite Athlete",icon:"🏆",color:T.purple,score,next:20};if(score>=9)return{name:"Competitor",icon:"⚡",color:T.orange,score,next:14};if(score>=5)return{name:"Athlete",icon:"💪",color:T.cyan,score,next:9};if(score>=2)return{name:"Trainee",icon:"🏃",color:T.green,score,next:5};return{name:"Rookie",icon:"🌱",color:T.dim,score,next:2}}
function checkProteinStreak(app,n){var log=app.nutritionLog||{},goal=app.proteinGoal||150,keys=Object.keys(log).sort().reverse().slice(0,n);if(keys.length<n)return false;return keys.every(k=>(log[k]||{}).protein>=goal)}

function Chart({points,color,gid}){
  if(!points||!points.length)return null;
  var W=300,H=130,PL=40,PB=24,PT=12,PR=10,cW=W-PL-PR,cH=H-PT-PB;
  var vals=points.map(p=>p.y),lo=Math.min(...vals),hi=Math.max(...vals),sp=hi-lo;
  var mn=sp===0?lo*0.9:lo-sp*0.1,mx=sp===0?lo*1.1:hi+sp*0.1,rng=mx-mn||1;
  const px=i=>PL+(points.length<2?cW/2:i/(points.length-1)*cW);
  const py=v=>PT+cH-((v-mn)/rng*cH);
  var lp=points.map((p,i)=>(i===0?"M":"L")+px(i).toFixed(1)+","+py(p.y).toFixed(1)).join(" ");
  var ap=`${lp}L${px(points.length-1).toFixed(1)},${(PT+cH).toFixed(1)}L${PL.toFixed(1)},${(PT+cH).toFixed(1)}Z`;
  var yticks=[lo,Math.round((lo+hi)/2),hi].filter((v,i,a)=>a.indexOf(v)===i);
  var xi=points.length<=3?points.map((_,i)=>i):[0,Math.floor((points.length-1)/2),points.length-1];
  return <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}}>
    <defs>
      <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
        <stop offset="100%" stopColor={color} stopOpacity="0.02"/>

    </defs>
    {[0,.5,1].map((t,i)=><line key={i} x1={PL} y1={PT+cH*(1-t)} x2={W-PR} y2={PT+cH*(1-t)} stroke="rgba(255,255,255,0.04)" strokeWidth="1" strokeDasharray="3,5"/>)}
    <path d={ap} fill={`url(#${gid})`}/>
    <path d={lp} stroke={color} strokeWidth="2.5" fill="none" strokeLinejoin="round" strokeLinecap="round" filter={`url(#${gid}f)`}/>
    {points.map((p,i)=><g key={i}><circle cx={px(i)} cy={py(p.y)} r="5" fill={T.bg} stroke={color} strokeWidth="2.5"/><circle cx={px(i)} cy={py(p.y)} r="2.5" fill={color}/></g>)}
    {yticks.map((v,i)=><text key={i} x={PL-6} y={py(v)+4} textAnchor="end" fill="rgba(255,255,255,0.25)" fontSize="9" fontFamily="Inter,sans-serif">{v}</text>)}
    {xi.map(i=><text key={i} x={px(i)} y={H-2} textAnchor="middle" fill="rgba(255,255,255,0.25)" fontSize="8" fontFamily="Inter,sans-serif">{points[i].label}</text>)}
  </svg>

// ── WARM-UP PANEL ─────────────────────────────────────────────────────────────
function WarmUpPanel({dayNum,onClose}){
  var wu=WARMUPS[dayNum];
  var [ticked,setTicked]=useState({});
  var [active,setActive]=useState(null); // {id, secs}
  var timerRef=useRef(null);

  function startTimer(item){
    clearInterval(timerRef.current);
    setActive({id:item.id,secs:item.dur});
    timerRef.current=setInterval(function(){
      setActive(function(prev){
        if(!prev||prev.id!==item.id)return prev;
        if(prev.secs<=1){
          clearInterval(timerRef.current);
          setTicked(function(t){return Object.assign({},t,{[item.id]:true})});
          return null;
        }
        return{id:prev.id,secs:prev.secs-1};
      });
    },1000);
  }

  useEffect(function(){return function(){clearInterval(timerRef.current)}},[]);

  var allDone=wu.items.every(function(i){return ticked[i.id]});
  var doneCount=wu.items.filter(function(i){return ticked[i.id]}).length;

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:8000,display:"flex",flexDirection:"column",justifyContent:"flex-end",animation:"fadeIn 0.2s ease"}}>
    <div style={{background:T.bg,borderRadius:"24px 24px 0 0",maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 -20px 60px rgba(0,0,0,0.8)"}}>
      {/* Handle */}
      <div style={{display:"flex",justifyContent:"center",padding:"12px 0 0"}}>
        <div style={{width:40,height:4,borderRadius:2,background:"rgba(255,255,255,0.15)"}}/>
      </div>
      {/* Header */}
      <div style={{padding:"16px 20px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{fontSize:11,color:wu.color,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>Warm-Up Protocol</div>
            <div style={{fontSize:18,fontWeight:800,color:T.white,letterSpacing:"-0.01em"}}>{wu.title}</div>
            <div style={{fontSize:12,color:T.muted,marginTop:3}}>~5 minutes · {wu.items.length} exercises</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,width:34,height:34,cursor:"pointer",color:T.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
        </div>
        {/* Progress bar */}
        <div style={{height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:(doneCount/wu.items.length*100)+"%",background:wu.color,borderRadius:2,transition:"width 0.4s",boxShadow:"0 0 8px "+wu.color+"88"}}/>
        </div>
        {allDone&&<div style={{marginTop:10,padding:"10px 14px",background:"rgba(0,255,136,0.08)",border:"1px solid rgba(0,255,136,0.18)",borderRadius:12,fontSize:13,fontWeight:700,color:T.green,textAlign:"center"}}>🔥 Ready to train! Let's go.</div>}
      </div>
      {/* Items */}
      <div style={{overflowY:"auto",padding:"12px 16px 24px",WebkitOverflowScrolling:"touch"}}>
        {wu.items.map(function(item){
          var done=ticked[item.id];
          var isActive=active&&active.id===item.id;
          var secs=isActive?active.secs:item.dur;
          var pct=isActive?((item.dur-active.secs)/item.dur*100):done?100:0;
          return <div key={item.id} onClick={function(){if(!done&&!isActive)startTimer(item)}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:done?"rgba(0,255,136,0.05)":isActive?wu.color+"10":"rgba(255,255,255,0.025)",border:"1px solid "+(done?"rgba(0,255,136,0.18)":isActive?wu.color+"33":"rgba(255,255,255,0.06)"),borderRadius:16,marginBottom:8,cursor:done?"default":isActive?"default":"pointer",transition:"all 0.25s",position:"relative",overflow:"hidden"}}>
            {/* Background fill for active */}
            {isActive&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:wu.color+"15",transition:"width 1s linear"}}/>}
            {/* Icon */}
            <div style={{width:44,height:44,borderRadius:14,background:done?"rgba(0,255,136,0.12)":isActive?wu.color+"18":"rgba(255,255,255,0.04)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,position:"relative",zIndex:1}}>{item.icon}</div>
            {/* Text */}
            <div style={{flex:1,minWidth:0,position:"relative",zIndex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:done?T.green:isActive?wu.color:T.white,marginBottom:3}}>{item.name}</div>
              <div style={{fontSize:11,color:T.muted,lineHeight:1.5}}>{item.desc}</div>
              {isActive&&<div style={{fontSize:11,fontWeight:700,color:wu.color,marginTop:4}}>⏱ {secs}s remaining...</div>}
              {!done&&!isActive&&<div style={{fontSize:10,color:T.dim,marginTop:3}}>Tap to start · {item.dur}s</div>}
            </div>
            {/* Status */}
            <div style={{flexShrink:0,position:"relative",zIndex:1}}>
              {done?<div style={{width:32,height:32,borderRadius:10,background:"rgba(0,255,136,0.15)",border:"1.5px solid rgba(0,255,136,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:T.green}}>✓</div>
              :isActive?<div style={{width:32,height:32,borderRadius:10,background:wu.color+"18",border:"1.5px solid "+wu.color+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:wu.color}}>{secs}</div>
              :<div style={{width:32,height:32,borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:T.dim}}>{item.dur}s</div>}
            </div>
          </div>
        })}
      </div>
    </div>
  </div>
}

// ── BARCODE SCANNER (ZXing — works in Safari) ─────────────────────────────────
function BarcodeScanner({onResult,onClose}){
  var videoRef=useRef(null),streamRef=useRef(null),readerRef=useRef(null);
  var [status,setStatus]=useState("starting");
  var [errMsg,setErrMsg]=useState("");
  var [flashOn,setFlashOn]=useState(false);

  useEffect(function(){
    var active=true;
    var ZXing=window.ZXing;
    if(!ZXing){setErrMsg("Scanner library not loaded. Please check your internet connection.");setStatus("error");return}
    var hints=new Map();
    var formats=[
      ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.DATA_MATRIX,ZXing.BarcodeFormat.QR_CODE
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    var reader=new ZXing.BrowserMultiFormatReader(hints,500);
    readerRef.current=reader;
    // Get camera stream
    navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080}}
    }).then(function(stream){
      if(!active){stream.getTracks().forEach(function(t){t.stop()});return}
      streamRef.current=stream;
      var video=videoRef.current;
      if(!video){stream.getTracks().forEach(function(t){t.stop()});return}
      video.srcObject=stream;
      video.setAttribute("playsinline","true");
      video.setAttribute("muted","true");
      video.play().then(function(){
        if(!active)return;
        setStatus("scanning");
        // Decode from video stream continuously
        reader.decodeFromVideoElement(video).then(function(result){
          if(!active)return;
          active=false;
          stopAll();
          onResult(result.getText());
        }).catch(function(e){
          // NotFoundException is normal — keeps scanning. Only flag real errors.
          if(active&&e&&e.name&&e.name!=="NotFoundException"&&e.name!=="ChecksumException"&&e.name!=="FormatException"){
            setErrMsg("Scanner error: "+e.message);setStatus("error");
          }
        });
      }).catch(function(e){setErrMsg("Could not start video: "+e.message);setStatus("error")});
    }).catch(function(e){
      setErrMsg("Camera access denied. Go to Settings → Safari → Camera and allow access.");
      setStatus("error");
    });
    function stopAll(){
      try{readerRef.current&&readerRef.current.reset()}catch(e){}
      if(streamRef.current)streamRef.current.getTracks().forEach(function(t){t.stop()});
    }
    return function(){active=false;stopAll()};
  },[]);

  function handleClose(){
    try{readerRef.current&&readerRef.current.reset()}catch(e){}
    if(streamRef.current)streamRef.current.getTracks().forEach(function(t){t.stop()});
    onClose();
  }

  return <div style={{position:"fixed",inset:0,background:"#000",zIndex:9000,display:"flex",flexDirection:"column"}}>
    {status==="starting"&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:44,height:44,borderRadius:"50%",border:"3px solid "+T.green,borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:T.green,fontSize:14,fontWeight:600}}>Opening camera...</div>
    </div>}
    {status==="error"&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>📷</div>
      <div style={{color:T.red,fontSize:14,fontWeight:600,marginBottom:10,lineHeight:1.7}}>{errMsg}</div>
      <div style={{color:T.muted,fontSize:12,marginBottom:24,lineHeight:1.7}}>If camera was denied, go to your iPhone Settings → Safari → Camera → Allow</div>
      <button onClick={handleClose} style={{padding:"13px 28px",background:T.g1,color:"#000",border:"none",borderRadius:100,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>Go Back</button>
    </div>}
    {status==="scanning"&&<div style={{flex:1,position:"relative",overflow:"hidden"}}>
      <video ref={videoRef} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} playsInline muted autoPlay/>
      {/* Overlay */}
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
        {/* Dark overlay with cutout */}
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)"}}/>
        {/* Scan frame */}
        <div style={{position:"relative",width:272,height:168,zIndex:2}}>
          <div style={{position:"absolute",inset:0,border:"none",borderRadius:16}}/>
          {/* Corner markers */}
          {[{top:0,left:0,bt:"3px solid #00ff88",bl:"3px solid #00ff88",br:"none",bb:"none",brl:"4px 0 0 0"},
            {top:0,right:0,bt:"3px solid #00ff88",br2:"3px solid #00ff88",bl:"none",bb:"none",brl:"0 4px 0 0"},
            {bottom:0,left:0,bb:"3px solid #00ff88",bl:"3px solid #00ff88",br:"none",bt:"none",brl:"0 0 0 4px"},
            {bottom:0,right:0,bb:"3px solid #00ff88",br2:"3px solid #00ff88",bl:"none",bt:"none",brl:"0 0 4px 0"}
          ].map(function(c,i){return <div key={i} style={{position:"absolute",width:30,height:30,top:c.top,bottom:c.bottom,left:c.left,right:c.right,borderTop:c.bt||c.bt2,borderLeft:c.bl,borderRight:c.br||c.br2,borderBottom:c.bb,borderRadius:c.brl}}/>})}
          {/* Scan line */}
          <div style={{position:"absolute",left:8,right:8,height:2,top:"50%",background:"linear-gradient(90deg,transparent,#00ff88,transparent)",boxShadow:"0 0 12px #00ff88",animation:"shimmer 1.8s ease-in-out infinite"}}/>
        </div>
        <div style={{position:"relative",zIndex:2,marginTop:20,textAlign:"center"}}>
          <div style={{color:"#fff",fontSize:15,fontWeight:700,textShadow:"0 2px 8px rgba(0,0,0,0.9)"}}>Point at a barcode</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginTop:5,textShadow:"0 1px 4px rgba(0,0,0,0.9)"}}>Hold steady — auto-detects instantly</div>
        </div>
      </div>
      {/* Cancel button */}
      <button onClick={handleClose} style={{position:"absolute",top:"max(56px,env(safe-area-inset-top))",right:18,background:"rgba(0,0,0,0.75)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:100,padding:"10px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Inter,sans-serif",zIndex:10}}>✕ Cancel</button>
    </div>}
  </div>
}


function useFoodLookup(){
  var [result,setResult]=useState(null);
  var [loading,setLoading]=useState(false);
  var [error,setError]=useState(null);
  function lookup(barcode){
    setLoading(true);setResult(null);setError(null);
    fetch("https://world.openfoodfacts.org/api/v0/product/"+barcode+".json")
      .then(function(r){return r.json()})
      .then(function(data){
        if(data.status===0){setError("Product not found. Try logging manually.");setLoading(false);return}
        var p=data.product,n=p.nutriments||{};
        var per100=n["energy-kcal_100g"]||n["energy_100g"]?true:false;
        setResult({
          name:p.product_name||p.generic_name||"Unknown Product",
          brand:p.brands||"",
          protein:Math.round((per100?n["proteins_100g"]:n["proteins"])||0),
          calories:Math.round((per100?n["energy-kcal_100g"]:n["energy-kcal"])||0),
          carbs:Math.round((per100?n["carbohydrates_100g"]:n["carbohydrates"])||0),
          fat:Math.round((per100?n["fat_100g"]:n["fat"])||0),
          per100:per100,
          image:p.image_front_small_url||null,
          barcode:barcode,
        });
        setLoading(false);
      })
      .catch(function(){setError("Network error. Check your connection.");setLoading(false)});
  }
  return{result,loading,error,lookup,reset:function(){setResult(null);setError(null)}};
}

function WorkoutCalendar({checkIns}){
  var [month,setMonth]=useState(new Date().getMonth()),[year,setYear]=useState(new Date().getFullYear());
  var today=new Date(),wdays={};
  checkIns.filter(c=>c.workout).forEach(c=>{var d=new Date(c.ts);wdays[d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()]=true});
  var fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  var cells=[];for(var i=0;i<fd;i++)cells.push(null);for(var d=1;d<=dim;d++)cells.push(d);while(cells.length%7!==0)cells.push(null);
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:22,padding:"18px",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,width:34,height:34,cursor:"pointer",color:T.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
      <div style={{fontSize:15,fontWeight:700,color:T.white}}>{MONTHS[month]} {year}</div>
      <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,width:34,height:34,cursor:"pointer",color:T.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:10}}>
      {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:T.dim,fontWeight:600,padding:"3px 0"}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
      {cells.map((d,i)=>{var isT=d&&today.getDate()===d&&today.getMonth()===month&&today.getFullYear()===year,hasW=d&&wdays[year+"-"+(month+1)+"-"+d];return <div key={i} style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",fontSize:12,fontWeight:d?600:400,background:hasW?"linear-gradient(135deg,#00ff88,#00cfff)":isT?"rgba(0,207,255,0.12)":"transparent",border:isT&&!hasW?"1.5px solid rgba(0,207,255,0.4)":"none",color:hasW?"#000":d?T.white:"transparent",boxShadow:hasW?"0 0 12px rgba(0,255,136,0.35)":"none",transition:"all 0.2s"}}>{d||""}</div>})}
    </div>
  </div>
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  var [app,setApp]=useState(null),[input,setInput]=useState(""),[loading,setLoading]=useState(false),[view,setView]=useState("program"),[showKey,setShowKey]=useState(false),[savedFlash,setSavedFlash]=useState(false),[showConfetti,setShowConfetti]=useState(false);
  var appRef=useRef(null),chatEnd=useRef(null);
  useEffect(()=>{var d=loadData();var state={...INIT,...(d||{})};appRef.current=state;T=state.darkMode===false?LIGHT_T:DARK_T;document.body.style.background=T.bg;setApp(state);if(!state.setupDone)setShowKey(true)},[]);
  useEffect(()=>{if(view==="chat"&&chatEnd.current)chatEnd.current.scrollIntoView({behavior:"smooth"})},[app,view]);
  useEffect(()=>{function fn(){if(appRef.current)saveData(appRef.current)}function vc(){if(document.visibilityState==="hidden")fn()}document.addEventListener("visibilitychange",vc);window.addEventListener("pagehide",fn);window.addEventListener("beforeunload",fn);return()=>{document.removeEventListener("visibilitychange",vc);window.removeEventListener("pagehide",fn);window.removeEventListener("beforeunload",fn)}},[]);
  var save=useCallback(updates=>{setApp(prev=>{var next={...prev,...updates};if("darkMode" in updates){T=next.darkMode===false?LIGHT_T:DARK_T;document.body.style.background=T.bg;document.documentElement.style.setProperty("--bg",T.bg);}appRef.current=next;saveData(next);setSavedFlash(true);setTimeout(()=>setSavedFlash(false),2000);return next})},[]);
  function saveKey(k){var u={...app||INIT,apiKey:k==="skip"?"":k,setupDone:true};appRef.current=u;setApp(u);saveData(u);setShowKey(false)}
  function sendMsg(text,meta){
    if(!text||!text.trim()||loading)return;
    var apiKey=(app&&app.apiKey)||"";
    if(!apiKey){setView("chat");setShowKey(true);return}
    setLoading(true);
    var userMsg={role:"user",content:text},msgs=(app.messages||[]).concat([userMsg]),upd={messages:msgs};
    if(meta&&meta.weight&&meta.weight>0)upd.weight=meta.weight;
    if(meta&&meta.workout)upd.totalWorkouts=(app.totalWorkouts||0)+1;
    if(meta&&meta.checkIn)upd.checkIns=(app.checkIns||[]).concat([meta.checkIn]);
    var today=new Date().toDateString();
    if(app.lastCheckIn!==today){var yd=new Date(Date.now()-86400000).toDateString();upd.streak=app.lastCheckIn===yd?(app.streak||0)+1:1;upd.lastCheckIn=today}
    setApp(prev=>{var next={...prev,...upd};appRef.current=next;saveData(next);return next});
    var sysMsg={role:"user",parts:[{text:COACH}]},sysRep={role:"model",parts:[{text:"Ready. I am your elite fitness coach."}]};
    var convMsgs=msgs.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
    fetch("https://generativelanguage.googleapis.com/v1beta/models?key="+apiKey)
      .then(r=>r.json()).then(data=>{
        if(data.error)throw new Error(data.error.message||"Key invalid");
        var models=data.models||[],model=null;
        for(var i=0;i<models.length;i++){if(models[i].name&&models[i].supportedGenerationMethods&&models[i].supportedGenerationMethods.includes("generateContent")){model=models[i].name.replace("models/","");break}}
        if(!model)throw new Error("No usable model found");
        return fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[sysMsg,sysRep].concat(convMsgs),generationConfig:{maxOutputTokens:1000}})})
      }).then(r=>r.json()).then(json=>{
        if(json.error)throw new Error(json.error.message||"API error");
        var parts=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts;
        var reply=parts&&parts[0]&&parts[0].text?parts[0].text:"No response.";
        var final={...upd,messages:msgs.concat([{role:"assistant",content:reply}])};
        setApp(prev=>{var next={...prev,...final};appRef.current=next;saveData(next);return next});
        setLoading(false);setView("chat");
      }).catch(e=>{
        var errMsg={role:"assistant",content:"Coach error: "+e.message+"\n\nTap ⚙️ to check your API key."};
        setApp(prev=>{var next={...prev,...upd,messages:msgs.concat([errMsg])};appRef.current=next;saveData(next);return next});
        setLoading(false);setView("chat");
      });
  }

  if(!app)return <div style={{height:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:18}}>
    <div style={{width:56,height:56,borderRadius:"50%",border:"3px solid #00ff88",borderTopColor:"transparent",animation:"spin 0.8s linear infinite",boxShadow:"0 0 28px rgba(0,255,136,0.5)"}}/>
    <div style={{color:T.green,fontSize:11,letterSpacing:"0.18em",fontWeight:700,textTransform:"uppercase"}}>Loading your program...</div>
  </div>;
  if(showKey)return <ApiKeyScreen onSave={saveKey}/>;

  var ph=PHASES[phaseOf(app.week||1)],level=getLevel(app),ss=calcStrengthScore(app.pbs||{},app.weight||130);
  var weekW=(app.checkIns||[]).filter(c=>c.workout&&(Date.now()-c.ts)<7*24*3600*1000).length;
  var pbCount=Object.keys(app.pbs||{}).length;
  var newBadges=ACHIEVEMENTS.filter(a=>{try{return a.check(app)}catch(e){return false}}).length;
  var today=todayKey(),todayP=((app.nutritionLog||{})[today]||{}).protein||0,todayGoal=app.proteinGoal||150;
  var TABS=[{v:"program",icon:"🏋️",label:"Program"},{v:"progress",icon:"📈",label:"Progress"},{v:"nutrition",icon:"🍗",label:"Nutrition"},{v:"awards",icon:"🏆",label:"Awards"},{v:"chat",icon:"💬",label:"Coach"}];

  return <div className="app-bg" style={{height:"100vh",height:"-webkit-fill-available",display:"flex",flexDirection:"column",fontFamily:"Inter,sans-serif",color:T.white,overflow:"hidden",maxWidth:640,margin:"0 auto",position:"relative"}}>

    {/* Ambient orbs */}
    <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,255,136,0.04),transparent 70%)",top:-200,right:-150,pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(196,77,255,0.04),transparent 70%)",bottom:50,left:-150,pointerEvents:"none",zIndex:0}}/>

    {/* Header */}
    <div style={{padding:"10px 18px",paddingTop:"max(12px,env(safe-area-inset-top))",flexShrink:0,background:"rgba(8,10,18,0.7)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid rgba(255,255,255,0.06)",position:"relative",zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:3}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:T.green,boxShadow:`0 0 12px ${T.green}`,animation:"glow 2s ease-in-out infinite"}}/>
            <span style={{fontSize:14,fontWeight:900,letterSpacing:"-0.01em",background:T.g1,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ELITE COACH</span>
            <span style={{fontSize:10,padding:"2px 10px",borderRadius:100,background:`${ph.color}18`,color:ph.color,border:`1px solid ${ph.color}33`,fontWeight:700}}>{ph.name}</span>
            <span style={{fontSize:10,padding:"2px 10px",borderRadius:100,background:`${level.color}18`,color:level.color,border:`1px solid ${level.color}33`,fontWeight:700}}>{level.icon} {level.name}</span>
          </div>
          <div style={{fontSize:9,color:T.dim,fontWeight:500,letterSpacing:"0.04em"}}>34M · 5'2" · Soccer Winger · Athletic Build</div>
        </div>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:900,color:"#ff9922",lineHeight:1}}>🔥 {app.streak||0}</div>
            <div style={{fontSize:7,color:T.dim,marginTop:2,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>Streak</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:900,color:level.color,lineHeight:1}}>💪 {ss}</div>
            <div style={{fontSize:7,color:T.dim,marginTop:2,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>Score</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            {savedFlash&&<span style={{fontSize:7,color:T.green,fontWeight:700,animation:"fadeIn 0.2s ease",letterSpacing:"0.06em"}}>saved ✓</span>}
            <button onClick={()=>setView("settings")} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>⚙️</button>
          </div>
        </div>
      </div>
    </div>

    {/* Stat rings */}
    <div style={{padding:"12px 18px",background:"rgba(8,10,18,0.5)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.05)",flexShrink:0,position:"relative",zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Ring pct={Math.min(weekW/3*100,100)} label="Weekly" value={weekW+"/3"} color={T.green} size={74} thick={6}/>
        <Ring pct={Math.min((app.week||1)/8*100,100)} label="Program" value={"W"+(app.week||1)} color={ph.color} size={74} thick={6}/>
        <Ring pct={ss} label="Strength" value={ss} color={level.color} size={74} thick={6}/>
        <Ring pct={Math.min(todayP/todayGoal*100,100)} label="Protein" value={Math.round(todayP)+"g"} color={T.green} size={74} thick={6}/>
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",zIndex:5}}>
      {view==="program"&&<ProgramView app={app} save={save} onNewPB={()=>setShowConfetti(true)}/>}
      {view==="progress"&&<ProgressView app={app} save={save}/>}
      {view==="nutrition"&&<NutritionView app={app} save={save} onSubmit={sendMsg} isLoading={loading}/>}
      {view==="awards"&&<AchievementsView app={app}/>}
      {view==="settings"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"12px 18px",flexShrink:0,display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <button onClick={()=>setView("program")} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,flexShrink:0}}>←</button>
          <div style={{fontSize:18,fontWeight:800,color:T.white,letterSpacing:"-0.01em"}}>Settings</div>
          <button onClick={()=>setShowKey(true)} style={{marginLeft:"auto",padding:"7px 14px",borderRadius:100,border:`1px solid ${app.apiKey?"rgba(0,255,136,0.3)":"rgba(255,255,255,0.08)"}`,background:app.apiKey?"rgba(0,255,136,0.08)":"rgba(255,255,255,0.03)",color:app.apiKey?T.green:T.muted,fontSize:11,cursor:"pointer",fontFamily:"Inter,sans-serif",fontWeight:700}}>🔑 API Key</button>
        </div>
        <SettingsView app={app} save={save}/>
      </div>}
      {view==="chat"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:"18px 16px",WebkitOverflowScrolling:"touch"}}>
          {(app.messages||[]).length===0&&<div style={{textAlign:"center",paddingTop:28,animation:"fadeUp 0.6s ease"}}>
            <div style={{width:72,height:72,borderRadius:26,background:"linear-gradient(135deg,#00ff88,#00cfff,#c44dff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 22px",boxShadow:"0 16px 48px rgba(0,255,136,0.35)",animation:"float 3s ease-in-out infinite"}}>⚡</div>
            <div style={{fontSize:22,fontWeight:900,color:T.white,marginBottom:8,letterSpacing:"-0.02em"}}>Your Coach is Ready</div>
            <div style={{fontSize:13,color:T.muted,lineHeight:1.9,marginBottom:24}}>34M · 5'2" · 130lbs · Soccer Winger<br/>8-Week Athletic Transformation</div>
            {!app.apiKey&&<div style={{background:"rgba(255,119,34,0.08)",border:"1px solid rgba(255,119,34,0.2)",borderRadius:16,padding:"14px 18px",marginBottom:18,fontSize:13,color:T.orange,fontWeight:500}}>⚠️ Tap ⚙️ → API Key to activate the coach</div>}
            <div style={{display:"flex",flexDirection:"column",gap:9,maxWidth:340,margin:"0 auto"}}>
              {[{l:"💪 Kick off my 8-week program",m:"I'm starting. 34M 5ft2 130lbs soccer winger. Goal lean strong athletic. Coaching intro and Week 1 priorities."},{l:"🍽️ Nutrition plan for my goals",m:"Practical nutrition plan. 34M 5ft2 130lbs winger. Build lean athletic muscle. 150g+ protein."},{l:"⚽ Soccer + gym balance",m:"How to structure my week around soccer to avoid overtraining and hit physique goals?"},{l:"📊 Weekly progress check",m:"Full weekly progress check. Flag adjustments and give me priorities for this week."}].map(a=><button key={a.l} onClick={()=>sendMsg(a.m,null)} disabled={loading} style={{padding:"14px 18px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,color:"rgba(255,255,255,0.7)",cursor:"pointer",fontSize:13,fontFamily:"Inter,sans-serif",textAlign:"left",fontWeight:500,transition:"all 0.2s",backdropFilter:"blur(10px)",boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}}>{a.l}</button>)}
            </div>
          </div>}
          {(app.messages||[]).map((m,i)=><ChatMsg key={i} msg={m}/>)}
          {loading&&<div style={{display:"flex",gap:12,marginBottom:18,alignItems:"center",animation:"fadeUp 0.3s ease"}}>
            <div style={{width:38,height:38,borderRadius:13,background:"linear-gradient(135deg,#00ff88,#00cfff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,boxShadow:"0 6px 20px rgba(0,255,136,0.35)"}}>⚡</div>
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"4px 18px 18px 18px",padding:"14px 18px",display:"flex",gap:6,backdropFilter:"blur(10px)"}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:T.green,animation:"pulse 1.2s ease-in-out infinite",animationDelay:(i*0.2)+"s"}}/>)}
            </div>
          </div>}
          <div ref={chatEnd}/>
        </div>
        <div style={{padding:"12px 16px",paddingBottom:"max(12px,env(safe-area-inset-bottom))",borderTop:"1px solid rgba(255,255,255,0.05)",flexShrink:0,display:"flex",gap:9,background:"rgba(8,10,18,0.8)",backdropFilter:"blur(24px)"}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey&&input.trim()){sendMsg(input,null);setInput("")}}} placeholder="Ask your coach anything..." style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",color:T.white,padding:"14px 18px",borderRadius:16,fontSize:14,outline:"none",fontFamily:"Inter,sans-serif",fontWeight:400}}/>
          <button onClick={()=>{if(input.trim()){sendMsg(input,null);setInput("")}}} disabled={loading||!input.trim()} style={{padding:"14px 20px",background:input.trim()&&!loading?T.g1:"rgba(255,255,255,0.05)",color:input.trim()&&!loading?"#000":"rgba(255,255,255,0.2)",border:"none",borderRadius:16,cursor:input.trim()&&!loading?"pointer":"not-allowed",fontSize:18,fontWeight:900,opacity:input.trim()&&!loading?1:0.4,transition:"all 0.2s",boxShadow:input.trim()&&!loading?"0 4px 20px rgba(0,255,136,0.3)":"none"}}>→</button>
        </div>
      </div>}
    </div>

    {/* Bottom nav — premium pill style */}
    <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.05)",flexShrink:0,background:"rgba(8,10,18,0.85)",backdropFilter:"blur(24px)",paddingBottom:"env(safe-area-inset-bottom)",position:"relative",zIndex:10}}>
      {TABS.map(t=>{var active=view===t.v||view==="settings"&&t.v==="program";return <button key={t.v} onClick={()=>setView(t.v)} style={{flex:1,padding:"10px 3px 8px",background:"transparent",border:"none",color:active?T.green:T.muted,cursor:"pointer",fontSize:8,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:700,fontFamily:"Inter,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.25s",position:"relative"}}>
        {active&&<div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:T.g1,borderRadius:"0 0 3px 3px",boxShadow:"0 0 12px rgba(0,255,136,0.7)"}}/>}
        <span style={{fontSize:20,filter:active?"drop-shadow(0 0 8px rgba(0,255,136,0.7))":"",transition:"filter 0.25s"}}>{t.icon}</span>
        <span>{t.label}</span>
      </button>})}
    </div>

    <Confetti show={showConfetti} onDone={()=>setShowConfetti(false)}/>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

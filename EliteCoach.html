// Winger injury substitutions — protect ankles, hamstrings, hip flexors
const INJURY_SUBS={

  hamstring:{d2e1:{id:"d2e1",name:"Glute Bridge",unit:"lbs",note:"Isolates glutes. No hamstring strain.",muscles:["glutes"]},d1e3:{id:"d1e3",name:"Trap Bar Deadlift",unit:"lbs",note:"Upright torso reduces hamstring pull.",muscles:["back","glutes"]}},
  hipflexor:{d2e6:{id:"d2e6",name:"Dead Bug",unit:"reps",note:"Core without hip flexor compression.",muscles:["core"]},d3e6:{id:"d3e6",name:"Bird Dog",unit:"reps",note:"Stability work. No hip flexor stress.",muscles:["core"]}},

// Achievements
const ACHIEVEMENTS=[
  {id:"first_pb",icon:"🥇",name:"First Blood",desc:"Set your first personal best",check:function(a){return Object.keys(a.pbs||{}).length>=1}},
  {id:"five_pbs",icon:"🦁",name:"Lion",desc:"Set 5 personal bests",check:function(a){return Object.keys(a.pbs||{}).length>=5}},
  {id:"all_pbs",icon:"🏆",name:"Hall of Champion",desc:"Set a PB on all 18 exercises",check:function(a){return Object.keys(a.pbs||{}).length>=18}},
  {id:"century_club",icon:"💯",name:"Century Club",desc:"Lift 100,000 lbs total",check:function(a){return calcVol(a.log)>=100000}},
  {id:"streak_7",icon:"⚡",name:"On Fire",desc:"7 day check-in streak",check:function(a){return (a.streak||0)>=7}},
  {id:"streak_14",icon:"🔥",name:"Unstoppable",desc:"14 day check-in streak",check:function(a){return (a.streak||0)>=14}},
  {id:"phase1",icon:"🏗️",name:"Foundation Built",desc:"Complete Foundation phase",check:function(a){return (a.week||1)>=3}},
  {id:"phase2",icon:"📈",name:"Building Strong",desc:"Reach Build phase week 4",check:function(a){return (a.week||1)>=5}},
  {id:"phase3",icon:"⚡",name:"Strength Unlocked",desc:"Reach Strength phase",check:function(a){return (a.week||1)>=7}},
  {id:"elite_8",icon:"👑",name:"8 Week Elite",desc:"Complete all 8 weeks",check:function(a){return (a.week||1)>=8&&calcSessions(a.log)>=20}},
  {id:"match_ready",icon:"⚽",name:"Match Ready",desc:"Log your first soccer match",check:function(a){return (a.matches||[]).length>=1}},
  {id:"nutrition_star",icon:"🍗",name:"Protein Star",desc:"Hit protein goal 3 days in a row",check:function(a){return checkProteinStreak(a,3)}},
];

const COACH="You are an elite AI fitness coach for a 34-year-old male soccer winger. Profile: 34M 5ft2 130lbs winger trains regularly. Goal: lean strong athletic NOT bulky. Explosive speed agility sharp cuts. Style: high energy direct pitch-side coach short punchy sentences. Nutrition 2400-2600 cal 150g+ protein. End with Today Action Plan max 3 bullets.";

// Storage
const SK="elitecoach-final",SK2="elitecoach-final-bak";
function saveData(d){var s=JSON.stringify(d);try{localStorage.setItem(SK,s)}catch(e){}try{localStorage.setItem(SK2,s)}catch(e){}try{sessionStorage.setItem(SK,s)}catch(e){}}
function loadData(){var srcs=[function(){return localStorage.getItem(SK)},function(){return localStorage.getItem(SK2)},function(){return sessionStorage.getItem(SK)}];for(var i=0;i<srcs.length;i++){try{var r=srcs[i]();if(r){var d=JSON.parse(r);if(d&&typeof d==="object")return d}}catch(e){}}return null}
var INIT={messages:[],streak:0,lastCheckIn:null,weight:130,startWeight:130,totalWorkouts:0,week:1,day:1,log:{},pbs:{},progressHistory:{},checkIns:[],apiKey:"",setupDone:false,bodyFat:15,sessionTs:{},darkMode:true,nutritionLog:{},proteinGoal:150,calorieGoal:2500,matches:[],injuryAreas:[],workoutNotes:{},customWeights:{}};

// Utils
function epley(w,r){return(w>0&&r>0)?Math.round(w*(1+r/30)):0}
function lkey(w,d){return"W"+w+"D"+d}
function todayKey(){var n=new Date();return n.getFullYear()+"-"+(n.getMonth()+1)+"-"+n.getDate()}
function fmtDate(ts){return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function fmtFull(ts){return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"})}
function sColor(v){return v>=7?"#00ff88":v>=4?"#ff7722":"#ff3366"}
function soColor(v){return v<=3?"#00ff88":v<=6?"#ff7722":"#ff3366"}
function avg(arr,k){if(!arr.length)return null;return+(arr.reduce(function(s,c){return s+(c[k]||0)},0)/arr.length).toFixed(1)}
function blankSets(ex,wk){var n=SCHEME[phaseOf(wk)].sets,arr=[];for(var i=0;i<n;i++)arr.push({set:i+1,weight:ex.unit==="lbs"?String(ex.start):"",reps:"",done:false});return arr}
function buildEntry(sets,wk,ts){var done=sets.filter(function(s){return s.done&&parseFloat(s.weight)>0&&parseInt(s.reps)>0});if(!done.length)return null;var best={estOneRM:0,maxWeight:0,maxReps:0};done.forEach(function(s){var orm=epley(parseFloat(s.weight),parseInt(s.reps));if(orm>best.estOneRM){best.estOneRM=orm;best.maxWeight=parseFloat(s.weight);best.maxReps=parseInt(s.reps)}});return{skey:"W"+wk,ts:ts,date:fmtDate(ts),label:fmtDate(ts),estOneRM:best.estOneRM,maxWeight:best.maxWeight,maxReps:best.maxReps}}
function mergeHistory(hist,exId,entry){if(!entry)return hist;var arr=(hist[exId]||[]).slice();var idx=-1;for(var i=0;i<arr.length;i++){if(arr[i].skey===entry.skey){idx=i;break}}if(idx>=0)arr[idx]=entry;else arr.push(entry);arr.sort(function(a,b){return a.ts-b.ts});var out=Object.assign({},hist);out[exId]=arr;return out}
function getPrevSets(log,exId,wk,dy){var cur=(wk-1)*3+(dy-1),best={idx:-1,sets:null},keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var m=keys[i].match(/^W(\d+)D(\d+)$/);if(!m)continue;var idx=(parseInt(m[1])-1)*3+(parseInt(m[2])-1);if(idx>=cur)continue;var sets=(log[keys[i]]||{})[exId];if(!sets||!sets.some(function(s){return s.done}))continue;if(idx>best.idx){best.idx=idx;best.sets=sets}}return best.sets}
function calcVol(log){var v=0,keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var sess=log[keys[i]]||{},exIds=Object.keys(sess);for(var j=0;j<exIds.length;j++){var sets=sess[exIds[j]]||[];for(var k=0;k<sets.length;k++){var s=sets[k];if(s.done&&parseFloat(s.weight)>0&&parseInt(s.reps)>0)v+=parseFloat(s.weight)*parseInt(s.reps)}}}return Math.round(v)}
function calcSessVol(sess){var v=0,exIds=Object.keys(sess||{});for(var j=0;j<exIds.length;j++){var sets=sess[exIds[j]]||[];for(var k=0;k<sets.length;k++){var s=sets[k];if(s.done&&parseFloat(s.weight)>0&&parseInt(s.reps)>0)v+=parseFloat(s.weight)*parseInt(s.reps)}}return Math.round(v)}
function calcSessions(log){var c=0,keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var sess=log[keys[i]]||{};var has=false;Object.keys(sess).forEach(function(exId){if((sess[exId]||[]).some(function(s){return s.done}))has=true});if(has)c++}return c}
function getMuscles(log){var map={},keys=Object.keys(log||{});for(var i=0;i<keys.length;i++){var sess=log[keys[i]]||{},exIds=Object.keys(sess);for(var j=0;j<exIds.length;j++){var sets=sess[exIds[j]]||[];if(sets.some(function(s){return s.done})){var ex=ALL_EX.find(function(e){return e.id===exIds[j]});if(ex)(ex.muscles||[]).forEach(function(m){map[m]=true})}}}return Object.keys(map)}
function dayColor(id){return PROG[1].exercises.find(function(e){return e.id===id})?PROG[1].color:PROG[2].exercises.find(function(e){return e.id===id})?PROG[2].color:PROG[3].color}
function dayGrad(id){return PROG[1].exercises.find(function(e){return e.id===id})?PROG[1].grad:PROG[2].exercises.find(function(e){return e.id===id})?PROG[2].grad:PROG[3].grad}
function getExForKey(id){return ALL_EX.find(function(e){return e.id===id})}
function calcStrengthScore(pbs,bw){
  var b=bw||130;
  var stds={d1e1:[0.5,1.0,1.5,2.0],d1e2:[0.45,0.75,1.0,1.4],d1e3:[0.9,1.4,1.9,2.4],d1e4:[0.15,0.28,0.42,0.6],d1e5:[0.35,0.55,0.75,1.0],d2e1:[0.7,1.0,1.4,1.9],d2e4:[0.35,0.55,0.75,1.0],d2e5:[0.25,0.4,0.6,0.8]};
  var wts={d1e1:0.2,d1e2:0.15,d1e3:0.25,d1e4:0.08,d1e5:0.1,d2e1:0.1,d2e4:0.07,d2e5:0.05};
  var total=0,tw=0;
  Object.keys(stds).forEach(function(id){
    var pb=pbs[id];if(!pb)return;
    var ratio=pb.oneRM/b,lvls=stds[id],score=0;
    if(ratio>=lvls[3])score=100;
    else if(ratio>=lvls[2])score=75+(ratio-lvls[2])/(lvls[3]-lvls[2])*25;
    else if(ratio>=lvls[1])score=50+(ratio-lvls[1])/(lvls[2]-lvls[1])*25;
    else if(ratio>=lvls[0])score=25+(ratio-lvls[0])/(lvls[1]-lvls[0])*25;
    else score=(ratio/lvls[0])*25;
    var w=wts[id]||0.05;total+=score*w;tw+=w;
  });
  return tw>0?Math.round(total/tw):0;
}
function getLevel(app){
  var achieved=ACHIEVEMENTS.filter(function(a){try{return a.check(app)}catch(e){return false}}).length;
  var workouts=calcSessions(app.log),pbs=Object.keys(app.pbs||{}).length;
  var score=achieved*3+Math.floor(workouts/2)+Math.floor(pbs/3);
  if(score>=20)return{name:"Legend",icon:"👑",color:"#ffe040",score:score,next:null};
  if(score>=14)return{name:"Elite Athlete",icon:"🏆",color:"#c44dff",score:score,next:20};
  if(score>=9)return{name:"Competitor",icon:"⚡",color:"#ff7722",score:score,next:14};
  if(score>=5)return{name:"Athlete",icon:"💪",color:"#00cfff",score:score,next:9};
  if(score>=2)return{name:"Trainee",icon:"🏃",color:"#00ff88",score:score,next:5};
  return{name:"Rookie",icon:"🌱",color:"rgba(255,255,255,0.5)",score:score,next:2};
}
function checkProteinStreak(app,n){
  var log=app.nutritionLog||{},goal=app.proteinGoal||150;
  var keys=Object.keys(log).sort().reverse().slice(0,n);
  if(keys.length<n)return false;
  return keys.every(function(k){return (log[k]||{}).protein>=goal});
}

function Chip({children,color,active}){color=color||"#00ff88";return <span style={{fontSize:9,padding:"3px 9px",borderRadius:20,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",display:"inline-block",whiteSpace:"nowrap",background:active?color+"22":"rgba(128,128,128,0.12)",color:active?color:C.muted,border:"1px solid "+(active?color+"44":"rgba(128,128,128,0.18)")}}>{children}</span>}
function GBar({pct,grad,h}){pct=pct||0;grad=grad||C.g1;h=h||5;return <div style={{height:h,background:C.border,borderRadius:h,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:grad,borderRadius:h,transition:"width 0.5s",boxShadow:pct>0?"0 0 8px rgba(0,255,136,0.3)":"none"}}/></div>}

    </div>

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  var [app,setApp]=useState(null),[input,setInput]=useState(""),[loading,setLoading]=useState(false),[view,setView]=useState("program"),[showKey,setShowKey]=useState(false),[savedFlash,setSavedFlash]=useState(false),[showConfetti,setShowConfetti]=useState(false);
  var appRef=useRef(null),chatEnd=useRef(null);

  useEffect(function(){
    var d=loadData();var state=Object.assign({},INIT,d||{});
    // Apply theme
    C=state.darkMode===false?LIGHT:DARK;
    document.body.style.background=C.bg;
    appRef.current=state;setApp(state);
    if(!state.setupDone)setShowKey(true);
  },[]);

  useEffect(function(){if(view==="chat"&&chatEnd.current)chatEnd.current.scrollIntoView({behavior:"smooth"})},[app,view]);

  useEffect(function(){
    function fn(){if(appRef.current)saveData(appRef.current)}
    function vc(){if(document.visibilityState==="hidden")fn()}
    document.addEventListener("visibilitychange",vc);window.addEventListener("pagehide",fn);window.addEventListener("beforeunload",fn);
    return function(){document.removeEventListener("visibilitychange",vc);window.removeEventListener("pagehide",fn);window.removeEventListener("beforeunload",fn)}
  },[]);

  var save=useCallback(function(updates){
    setApp(function(prev){
      var next=Object.assign({},prev,updates);
      // Update theme if darkMode changed
      if("darkMode" in updates){C=next.darkMode===false?LIGHT:DARK;document.body.style.background=C.bg;}
      appRef.current=next;saveData(next);
      setSavedFlash(true);setTimeout(function(){setSavedFlash(false)},2000);
      return next;
    });
  },[]);

  function saveKey(key){var u=Object.assign({},app||INIT,{apiKey:key==="skip"?"":key,setupDone:true});appRef.current=u;setApp(u);saveData(u);setShowKey(false)}

  function sendMsg(text,meta){
    if(!text||!text.trim()||loading)return;
    var apiKey=(app&&app.apiKey)||"";
    if(!apiKey){setView("chat");setShowKey(true);return}
    setLoading(true);
    var userMsg={role:"user",content:text},msgs=(app.messages||[]).concat([userMsg]),upd={messages:msgs};
    if(meta&&meta.weight&&meta.weight>0)upd.weight=meta.weight;
    if(meta&&meta.workout)upd.totalWorkouts=(app.totalWorkouts||0)+1;
    if(meta&&meta.checkIn)upd.checkIns=(app.checkIns||[]).concat([meta.checkIn]);
    var today=new Date().toDateString();
    if(app.lastCheckIn!==today){var yd=new Date(Date.now()-86400000).toDateString();upd.streak=app.lastCheckIn===yd?(app.streak||0)+1:1;upd.lastCheckIn=today}
    setApp(function(prev){var next=Object.assign({},prev,upd);appRef.current=next;saveData(next);return next});
    var sysMsg={role:"user",parts:[{text:COACH}]},sysRep={role:"model",parts:[{text:"Ready. I am your elite fitness coach."}]};
    var convMsgs=msgs.map(function(m){return{role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}});
    fetch("https://generativelanguage.googleapis.com/v1beta/models?key="+apiKey)
      .then(function(r){return r.json()}).then(function(data){
        if(data.error)throw new Error(data.error.message||"Key invalid");
        var models=data.models||[],model=null;
        for(var i=0;i<models.length;i++){if(models[i].name&&models[i].supportedGenerationMethods&&models[i].supportedGenerationMethods.includes("generateContent")){model=models[i].name.replace("models/","");break}}
        if(!model)throw new Error("No usable model found");
        return fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[sysMsg,sysRep].concat(convMsgs),generationConfig:{maxOutputTokens:1000}})})
      }).then(function(r){return r.json()}).then(function(json){
        if(json.error)throw new Error(json.error.message||"API error");
        var parts=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts;
        var reply=parts&&parts[0]&&parts[0].text?parts[0].text:"No response.";
        var final=Object.assign({},upd,{messages:msgs.concat([{role:"assistant",content:reply}])});
        setApp(function(prev){var next=Object.assign({},prev,final);appRef.current=next;saveData(next);return next});
        setLoading(false);setView("chat");
      }).catch(function(e){
        var errMsg={role:"assistant",content:"Coach error: "+e.message+"\n\nTap ⚙️ top-right to check your API key."};
        setApp(function(prev){var next=Object.assign({},prev,upd,{messages:msgs.concat([errMsg])});appRef.current=next;saveData(next);return next});
        setLoading(false);setView("chat");
      });
  }

  if(!app)return <div style={{height:"100vh",background:"#0B0F1A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{width:48,height:48,borderRadius:"50%",border:"3px solid #00ff88",borderTopColor:"transparent",animation:"spin 0.8s linear infinite",boxShadow:"0 0 20px rgba(0,255,136,0.5)"}}/><div style={{color:"#00ff88",fontSize:11,letterSpacing:"0.16em",fontWeight:600,textTransform:"uppercase"}}>Loading...</div></div>;
  if(showKey)return <ApiKeyScreen onSave={saveKey}/>;

  var wc=(app.weight||130)-app.startWeight,ph=PHASES[phaseOf(app.week||1)];
  var weekW=(app.checkIns||[]).filter(function(c){return c.workout&&(Date.now()-c.ts)<7*24*3600*1000}).length;
  var pbCount=Object.keys(app.pbs||{}).length;
  var level=getLevel(app);
  var strengthScore=calcStrengthScore(app.pbs||{},app.weight||130);
  var isDark=app.darkMode!==false;
  var newAchievements=ACHIEVEMENTS.filter(function(a){try{return a.check(app)}catch(e){return false}}).length;

  var TABS=[{v:"program",icon:"🏋️",label:"Program"},{v:"progress",icon:"📈",label:"Progress"},{v:"nutrition",icon:"🍗",label:"Nutrition"},{v:"awards",icon:"🏆",label:"Awards"},{v:"chat",icon:"💬",label:"Coach"}];

  return <div style={{height:"100vh",height:"-webkit-fill-available",background:C.bg,display:"flex",flexDirection:"column",fontFamily:"Inter,sans-serif",color:C.white,overflow:"hidden",maxWidth:640,margin:"0 auto",position:"relative",transition:"background 0.3s"}}>
    <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,255,136,0.04),transparent 70%)",top:-150,right:-100,pointerEvents:"none",zIndex:0}}/>

    {/* Header */}
    <div style={{padding:"10px 16px",paddingTop:"max(10px,env(safe-area-inset-top))",flexShrink:0,background:isDark?"rgba(11,15,26,0.85)":C.surf,backdropFilter:"blur(20px)",borderBottom:"1px solid "+C.border,position:"relative",zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#00ff88",boxShadow:"0 0 10px #00ff88"}}/>
            <span style={{fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#00ff88,#00cfff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ELITE COACH</span>
            <span style={{fontSize:10,padding:"2px 9px",borderRadius:20,background:ph.color+"22",color:ph.color,border:"1px solid "+ph.color+"44",fontWeight:700}}>{ph.name}</span>
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:level.color+"22",color:level.color,border:"1px solid "+level.color+"44",fontWeight:700}}>{level.icon} {level.name}</span>
          </div>
          <div style={{fontSize:9,color:C.muted}}>34M · 5'2" · Soccer Winger · Athletic Build</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {[{ico:"🔥",v:String(app.streak||0),l:"Streak",c:"#ff9922"},{ico:"💪",v:String(strengthScore),l:"Score",c:level.color}].map(function(s,i){return <div key={i} style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:900,color:s.c,lineHeight:1}}>{s.ico+" "+s.v}</div><div style={{fontSize:7,color:C.muted,marginTop:2}}>{s.l}</div></div>})}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            {savedFlash&&<span style={{fontSize:7,color:"#00ff88",fontWeight:700,animation:"fadeIn 0.2s ease"}}>saved ✓</span>}
            <button onClick={function(){setView("settings")}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>⚙️</button>
          </div>
        </div>
      </div>
    </div>

    {/* Stats rings */}
    <div style={{padding:"10px 16px",background:isDark?"rgba(255,255,255,0.01)":C.surf,borderBottom:"1px solid "+C.border,flexShrink:0,position:"relative",zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Ring pct={Math.min(weekW/3*100,100)} label="Weekly" value={weekW+"/3"} color="#00ff88" size={72}/>
        <Ring pct={Math.min((app.week||1)/8*100,100)} label="Program" value={"W"+(app.week||1)} color={ph.color} size={72}/>
        <Ring pct={strengthScore} label="Strength" value={strengthScore} color={level.color} size={72}/>
        <Ring pct={Math.min(newAchievements/ACHIEVEMENTS.length*100,100)} label="Badges" value={newAchievements+"/"+ACHIEVEMENTS.length} color="#ffe040" size={72}/>
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",zIndex:5}}>
      {view==="program"&&<ProgramView app={app} save={save} onNewPB={function(){setShowConfetti(true)}}/>}
      {view==="progress"&&<ProgressView app={app} save={save}/>}
      {view==="nutrition"&&<NutritionView app={app} save={save}/>}
      {view==="awards"&&<AchievementsView app={app}/>}
      {view==="settings"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"10px 14px 0",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
          <button onClick={function(){setView("program")}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,flexShrink:0}}>←</button>
          <div style={{fontSize:16,fontWeight:800,color:C.white}}>Settings</div>
          <button onClick={function(){setShowKey(true)}} style={{marginLeft:"auto",padding:"6px 12px",borderRadius:8,border:"1px solid "+C.border,background:C.card,color:app.apiKey?"#00ff88":C.muted,fontSize:10,cursor:"pointer",fontFamily:"Inter,sans-serif",fontWeight:700}}>🔑 API Key</button>
        </div>
        <SettingsView app={app} save={save}/>
      </div>}
      {view==="chat"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:"16px 14px",WebkitOverflowScrolling:"touch"}}>
          {(app.messages||[]).length===0&&<div style={{textAlign:"center",paddingTop:24,animation:"fadeUp 0.5s ease"}}>
            <div style={{width:64,height:64,borderRadius:22,background:"linear-gradient(135deg,#00ff88,#00cfff,#c44dff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 18px",boxShadow:"0 8px 40px rgba(0,255,136,0.3)",animation:"float 3s ease-in-out infinite"}}>⚡</div>
            <div style={{fontSize:20,fontWeight:800,color:C.white,marginBottom:6}}>Your Coach is Ready</div>
            <div style={{fontSize:11,color:C.muted,lineHeight:1.8,marginBottom:20}}>34M · 5'2" · 130lbs · Soccer Winger<br/>8-Week Athletic Transformation</div>
            {!app.apiKey&&<div style={{background:"rgba(255,119,34,0.1)",border:"1px solid rgba(255,119,34,0.25)",borderRadius:14,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#ff7722"}}>⚠️ Tap ⚙️ → API Key to activate the coach</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8,maxWidth:320,margin:"0 auto"}}>
              {[{l:"💪 Kick off my 8-week program",m:"I'm starting. 34M 5ft2 130lbs soccer winger. Goal lean strong athletic. Give me coaching intro and Week 1 priorities."},{l:"🍽️ Nutrition plan",m:"Practical nutrition plan. 34M 5ft2 130lbs winger. Build lean athletic muscle. 150g+ protein target."},{l:"⚽ Soccer + gym balance",m:"How to structure my week around soccer to avoid overtraining and hit physique goals?"},{l:"📊 Weekly progress check",m:"Full weekly progress check. Flag adjustments and give me priorities for this week."}].map(function(a){return <button key={a.l} onClick={function(){sendMsg(a.m,null)}} disabled={loading} style={{padding:"12px 14px",background:C.card,border:"1px solid "+C.border,borderRadius:14,color:C.text,cursor:"pointer",fontSize:12,fontFamily:"Inter,sans-serif",textAlign:"left"}}>{a.l}</button>})}
            </div>
          </div>}
          {(app.messages||[]).map(function(m,i){return <ChatMsg key={i} msg={m}/>})}
          {loading&&<div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",animation:"fadeUp 0.3s ease"}}><div style={{width:34,height:34,borderRadius:12,background:"linear-gradient(135deg,#00ff88,#00cfff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,boxShadow:"0 4px 16px rgba(0,255,136,0.3)"}}>⚡</div><div style={{background:C.surf,border:"1px solid "+C.border,borderRadius:"4px 16px 16px 16px",padding:"13px 16px",display:"flex",gap:5}}>{[0,1,2].map(function(i){return <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#00ff88",animation:"pulse 1.2s ease-in-out infinite",animationDelay:(i*0.2)+"s"}}/>})}</div></div>}
          <div ref={chatEnd}/>
        </div>
        <div style={{padding:"10px 14px",paddingBottom:"max(10px,env(safe-area-inset-bottom))",borderTop:"1px solid "+C.border,flexShrink:0,display:"flex",gap:8,background:isDark?"rgba(11,15,26,0.9)":C.surf,backdropFilter:"blur(20px)"}}>
          <input value={input} onChange={function(e){setInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey&&input.trim()){sendMsg(input,null);setInput("")}}} placeholder="Ask your coach anything..." style={{flex:1,background:C.card,border:"1px solid "+C.border,color:C.white,padding:"13px 16px",borderRadius:14,fontSize:13,outline:"none",fontFamily:"Inter,sans-serif"}}/>
          <button onClick={function(){if(input.trim()){sendMsg(input,null);setInput("")}}} disabled={loading||!input.trim()} style={{padding:"13px 18px",background:input.trim()&&!loading?"linear-gradient(135deg,#00ff88,#00cfff)":"#151d38",color:input.trim()&&!loading?"#000":"#334",border:"none",borderRadius:14,cursor:input.trim()&&!loading?"pointer":"not-allowed",fontSize:16,fontWeight:900,opacity:input.trim()&&!loading?1:0.4,transition:"all 0.2s"}}>→</button>
        </div>
      </div>}
    </div>

    {/* Bottom nav */}
    <div style={{display:"flex",borderTop:"1px solid "+C.border,flexShrink:0,background:isDark?"rgba(11,15,26,0.95)":C.surf,backdropFilter:"blur(20px)",paddingBottom:"env(safe-area-inset-bottom)",position:"relative",zIndex:10}}>
      {TABS.map(function(t){var active=view===t.v;return <button key={t.v} onClick={function(){setView(t.v)}} style={{flex:1,padding:"9px 3px 7px",background:"transparent",border:"none",color:active?"#00ff88":C.muted,cursor:"pointer",fontSize:8,letterSpacing:"0.04em",textTransform:"uppercase",fontWeight:700,fontFamily:"Inter,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.2s",position:"relative"}}>
        {active&&<div style={{position:"absolute",top:0,left:"15%",right:"15%",height:2,background:"linear-gradient(90deg,#00ff88,#00cfff)",borderRadius:"0 0 2px 2px",boxShadow:"0 0 8px rgba(0,255,136,0.6)"}}/>}
        <span style={{fontSize:17,filter:active?"drop-shadow(0 0 5px rgba(0,255,136,0.6))":""}}>{t.icon}</span>
        {t.label}
      </button>})}
    </div>

    <Confetti show={showConfetti} onDone={function(){setShowConfetti(false)}}/>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

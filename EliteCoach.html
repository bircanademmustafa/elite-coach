    </div>
    <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.06)",flexShrink:0,background:"rgba(11,15,26,0.95)",backdropFilter:"blur(20px)",paddingBottom:"env(safe-area-inset-bottom)",position:"relative",zIndex:10}}>
      {TABS.map(t=>{const active=view===t.v;return <button key={t.v} onClick={()=>setView(t.v)} style={{flex:1,padding:"9px 3px 7px",background:"transparent",border:"none",color:active?C.green:C.muted,cursor:"pointer",fontSize:8,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:700,fontFamily:"Inter,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.2s",position:"relative"}}>{active&&<div style={{position:"absolute",top:0,left:"15%",right:"15%",height:2,background:"linear-gradient(90deg,#00ff88,#00cfff)",borderRadius:"0 0 2px 2px",boxShadow:"0 0 8px rgba(0,255,136,0.6)"}}/>}<span style={{fontSize:18,filter:active?"drop-shadow(0 0 5px rgba(0,255,136,0.6))":""}}>{t.icon}</span>{t.label}</button>})}
    </div>
    <Confetti show={showConfetti} onDone={()=>setShowConfetti(false)}/>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
